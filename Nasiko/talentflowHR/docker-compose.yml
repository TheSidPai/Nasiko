services:
  mongodb:
    image: mongo:7
    container_name: talentflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - talentflow-net

  backend:
    build: .
    container_name: talentflow-backend
    restart: unless-stopped
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - MONGO_URI=mongodb://mongodb:27017
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - talentflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talentflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - talentflow-net

volumes:
  mongo_data:

networks:
  talentflow-net:
    driver: bridge
