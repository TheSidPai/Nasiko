<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
    <linearGradient id="bolt" x1="28" y1="6" x2="36" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f0e6ff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect x="3" y="3" width="58" height="58" rx="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Lightning bolt -->
  <path d="M36 6 L20 34 H30 L28 58 L44 30 H34 Z" fill="url(#bolt)" opacity="0.95"/>

  <!-- Small "HR" text below bolt -->
  <text x="32" y="61" font-family="'DM Sans', Arial, sans-serif" font-size="9" font-weight="700"
        fill="rgba(255,255,255,0.0)" text-anchor="middle" letter-spacing="1"/>
</svg>
